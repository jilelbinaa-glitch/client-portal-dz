<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="100" cy="100" r="96"/>
    </clipPath>
  </defs>

  <!-- الحلقة الخارجية البرتقالية -->
  <circle cx="100" cy="100" r="98" fill="#c07840" />
  <!-- الخلفية الداخلية بيضاء رمادية -->
  <circle cx="100" cy="100" r="93" fill="#e8e8e0" />
  <!-- حلقة داخلية رفيعة -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#c07840" stroke-width="1.5"/>

  <!-- شكل المنزل — الإطار الخارجي بلون القرميد -->
  <!-- السقف -->
  <polyline points="100,28 148,68 148,70 52,70 52,68" fill="none" stroke="#c07840" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- خط السقف العلوي -->
  <line x1="100" y1="28" x2="52" y2="68" stroke="#c07840" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="100" y1="28" x2="148" y2="68" stroke="#c07840" stroke-width="3.5" stroke-linecap="round"/>
  <!-- الجدار الأيسر -->
  <line x1="52" y1="68" x2="52" y2="130" stroke="#c07840" stroke-width="3.5" stroke-linecap="round"/>
  <!-- الجدار الأيمن -->
  <line x1="148" y1="68" x2="148" y2="130" stroke="#c07840" stroke-width="3.5" stroke-linecap="round"/>
  <!-- الأرضية -->
  <line x1="52" y1="130" x2="148" y2="130" stroke="#c07840" stroke-width="3.5" stroke-linecap="round"/>

  <!-- الخط الكوفي "جيل" باللون الأخضر -->
  <text x="100" y="95" font-family="serif" font-size="28" font-weight="bold"
        fill="#2a8a5a" text-anchor="middle" letter-spacing="1">جيل</text>

  <!-- الخط الكوفي "البناء" باللون الأحمر -->
  <text x="100" y="125" font-family="serif" font-size="22" font-weight="bold"
        fill="#c0392b" text-anchor="middle" letter-spacing="1">البناء</text>

  <!-- الزخرفة الهندسية — مربعات متداخلة زرقاء رمادية (يمين) -->
  <g transform="translate(138,72) rotate(10)">
    <rect x="0" y="0" width="12" height="12" fill="none" stroke="#7aaccc" stroke-width="1.5"/>
    <rect x="3" y="3" width="6" height="6" fill="none" stroke="#7aaccc" stroke-width="1"/>
    <rect x="1.5" y="1.5" width="9" height="9" fill="none" stroke="#aacde0" stroke-width="0.7"/>
  </g>

  <!-- النص العلوي بالعربية -->
  <text x="100" y="22" font-family="Cairo, sans-serif" font-size="7.5" font-weight="600"
        fill="#333" text-anchor="middle" letter-spacing="0.3">
    مكتب الدراسات الهندسية المعمارية و العمرانية
  </text>

  <!-- النص السفلي "جيل البناء" كبير -->
  <text x="100" y="152" font-family="Cairo, serif" font-size="13" font-weight="700"
        fill="#222" text-anchor="middle" letter-spacing="1">جيل البناء</text>

  <!-- النص الإنجليزي السفلي -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="5.5" font-weight="600"
        fill="#555" text-anchor="middle" letter-spacing="0.5">
    JEL AL-BINA'A · Architecture &amp; Urban Studies
  </text>

  <!-- خط فاصل أسفل -->
  <line x1="60" y1="168" x2="140" y2="168" stroke="#c07840" stroke-width="1"/>
</svg>
